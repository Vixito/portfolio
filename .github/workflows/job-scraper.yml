name: Apify Job Scraper & CV Generator

on:
  schedule:
    # Corre todos los días a las 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde GitHub si es necesario

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Setup Doppler
        uses: dopplerhq/cli-action@v3

      - name: Run Job Scraper
        run: doppler run -- deno run --allow-net --allow-env src/automation/jobScraper.ts
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
